language: en-US

reviews:
  profile: assertive
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    # Skip mechanical PRs that don't benefit from review.
    # `chore(release):` PRs are version-bump-only; the substantive change
    # was already reviewed on its own PR. Dep-bump PRs come from
    # automation that has its own contract with the registry. WIP and
    # explicit skip markers are author opt-outs.
    ignore_title_keywords:
      - 'chore(release):'
      - 'chore(deps):'
      - 'chore(deps-dev):'
      - '[skip review]'
      - 'WIP'
    ignore_usernames:
      - 'release-please[bot]'
      - 'renovate[bot]'
      - 'dependabot[bot]'
      - 'github-actions[bot]'

  # `plugin/` is the TypeScript + webpack build output; tracked because
  # the App Store install path needs it, but never authored by hand
  # (the source of truth is `src/` + `public/`). Lockfiles and minified
  # files are also off-limits.
  path_filters:
    - '!plugin/**'
    - '!**/node_modules/**'
    - '!**/package-lock.json'
    - '!**/yarn.lock'
    - '!**/pnpm-lock.yaml'
    - '!**/*.min.js'
    - '!**/*.min.css'

  high_level_summary_instructions: |
    Write summaries in present tense. Describe what the code does, not
    what it did. Skip filler like "This PR" — go straight to the change.

  path_instructions:
    - path: '**/*'
      instructions: |
        ## Project at a glance
        `@marineyachtradar/signalk-plugin` is a Signal K server plugin
        that bridges the Signal K Radar API to a `mayara-server`
        instance. It is a thin proxy: registers as a Radar API provider,
        forwards control commands over HTTP, and pipes binary spoke
        data via Signal K's `binaryStreamManager`. All radar protocol
        handling lives in mayara-server, not here. Two modes:
        container (default, via signalk-container) and external (direct
        host/port).

        ## One logical change per PR
        Hard rule. A bundled PR that "while I was in here, I also fixed
        X" is not acceptable, even for small X. The publish workflow
        generates GitHub Release notes from PR titles on `v*` tag push —
        a bundled PR produces a single release-note line that hides the
        smaller change. If a PR would produce two distinct release-note
        lines, it should be two PRs.

        ## Conventional commit PR title
        The PR title must follow Angular conventional commit format:
        `<type>(<scope>): <subject>`. Accepted types: feat, fix, docs,
        style, refactor, test, chore, perf, ci. Subject: imperative
        mood ("add" not "added"), no trailing period, under 70
        characters. The PR title becomes the line in the auto-generated
        GitHub Release notes.

        ## Branch naming
        No `/` in branch names — Signal K maintainers' convention. Use
        hyphens: `fix-container-startup`, not `fix/container-startup`.

        ## Version numbers are release-PR-only
        Flag any non-release PR that changes the version in
        `package.json`. Version bumps happen in their own
        `chore(release): X.Y.Z` PR, never bundled with a feature or
        fix. The release PR also tracks `plugin/` build output that
        embeds the version.

        ## No CHANGELOG.md
        This repo has no CHANGELOG.md; release notes are generated by
        `publish.yml` from PR titles on tag push. Flag any PR that
        adds a CHANGELOG.md — there is no place to keep it in sync.

        ## Echo comments
        Flag any comment that merely restates what the code already
        says. Examples:
        - `// Sets the value` above an obvious setter
        - `// Loop through items` above a `for` loop over items
        - `// returns null` next to `return null` in an error branch
        Replace with comments explaining *why*, or delete.

        ## Leftover crumbs from intermediate commits
        Flag references to things that existed in earlier commits of
        this PR but are no longer present: removed variables, renamed
        functions, deleted files, superseded approaches.

        ## Documentation drift risk
        Flag any .md file that contains detailed implementation steps,
        specific API call sequences, code snippets, or configuration
        values that are likely to fall out of sync. Documentation
        should describe architecture conceptually — not step-by-step
        instructions that duplicate or shadow the code itself.
        AGENTS.md is the intentional exception: it documents
        non-obvious project conventions that ARE allowed to be
        prescriptive.

        ## Unchecked items / speculative test plans
        Flag any PR description (or .md file) with a checklist
        containing unchecked items: either the work is incomplete, or
        the checklist should be removed before merge. Flag any
        "Tested" section that lists manual tests as intentions rather
        than things actually run.

        ## AI attribution footers
        Flag any commit message, PR description, or code comment
        containing "Co-Authored-By: Claude", "Generated with Claude
        Code", "🤖 Generated with", or similar AI-attribution. These
        do not belong in the project history.

        ## Implementation status in product documentation
        Flag implementation-progress narratives in README.md,
        AGENTS.md, or other reference docs (e.g. "Step 3: implement
        X", "TODO: add Y", "currently implemented as Z"). Architecture
        decisions and design rationale are fine; build-progress
        narratives are not.

        ## Scope
        Focus on files changed since main. Think carefully about how
        changes interact with existing code, tests, and documentation —
        not just the diff in isolation.

    - path: 'src/**/*.ts'
      instructions: |
        ## TypeScript strict, no new .js sources
        tsconfig is strict. Avoid `any`. The one allowed escape is the
        cast on `(globalThis as any).__signalk_containerManager`
        inside `getContainerManager()` — the consumer side cannot take
        a compile-time dependency on signalk-container. Reuse types
        from `src/types.ts` (`ContainerConfig`, `ContainerManagerApi`,
        `ContainerResourceLimits`, …) rather than redefining.

        ## Schema defaults must be merged at start()
        Signal K does NOT inject schema `default` annotations into the
        runtime config passed to `plugin.start()`. Defaults only seed
        the admin-UI form. When the plugin is auto-enabled
        (`signalk-plugin-enabled-by-default: true`), `start()` is
        called with `{}`. Flag any change to `start()` in
        `src/index.ts` that drops the `SCHEMA_DEFAULTS` spread —
        without it, `settings.managedContainer` is `undefined`, the
        container-startup branch is silently skipped, and the plugin
        sits in an endless reconnect loop. Regression test in
        `test/container-integration.test.ts` is "starts the container
        even when start() is called with empty config".

        ## Cross-plugin globalThis API needs undefined-handling
        signalk-container exposes its API on
        `globalThis.__signalk_containerManager`, not on the `app`
        object (Signal K passes each plugin a shallow copy of `app`).
        The typed accessor `getContainerManager()` returns `undefined`
        when the user disabled signalk-container or it hasn't finished
        its own `start()` yet on a cold boot. Flag any new call site
        that uses the returned manager without handling `undefined`.

        ## waitForContainerManager: re-check after whenReady()
        `waitForContainerManager()` first polls for the global to
        appear (signalk-container's `start()` may run after mayara's
        on cold boot), then awaits `containers.whenReady()` to let
        runtime detection settle. `whenReady()` resolves on success
        OR failure of detection — so after the await, re-check
        `getRuntime()`. Flag any refactor that collapses these into a
        single await without the re-check.

        ## No fs import in src/index.ts
        Container drift handling is centralised in signalk-container
        ≥1.6.0 (`ensureRunning` diffs `ContainerConfig` against the
        live container and recreates on drift). The plugin no longer
        maintains a local `.container-hash` file. Flag any new `fs`,
        `node:fs`, or `node:fs/promises` import in `src/index.ts` —
        the static guard test ("src/index.ts does not import fs")
        catches it, but a reviewer flag is defence in depth. The
        token-file cache that legitimately uses `fs` lives in
        `src/signalk-token.ts`, not in index.ts.

        ## Signal K device-token flow invariants
        `src/signalk-token.ts` + `ensureSignalkToken()` in
        `src/index.ts` drive the standard SK device-access-request
        flow with `clientId = mayara-server-signalk-plugin` and
        `permissions: 'readwrite'`. Flag PRs that:
        - drop the `readwrite` scope without rationale (SK admin UI
          cannot widen permissions post-approval, only revoke +
          re-request; roadmap reserves the scope for future
          radar/target/notification writebacks)
        - change the `clientId`
        - cache the token anywhere other than
          `${app.getDataDirPath()}/signalk-token` (mode 0600)
        - switch from delivering the token via the
          `MAYARA_SIGNALK_TOKEN` env var to a bind-mounted file. The
          env-var path was chosen because on docker / rootful podman
          signalk-container emits `--user 1000:1000` (the mayara
          image's USER); a 0600 file on the host owned by the SK
          process user is unreadable from inside the container at
          that UID. Env vars cross the UID boundary unconditionally.
        - skip the `tokenPollerCancelled` cancellation flag in
          `start()` / `stop()` — the access-request poller will
          outlive the plugin otherwise
        - remove the escape hatch: if the user passes `-n` in
          `mayaraArgs`, the plugin must neither inject its default `-n`
          nor set the token env

        ## Container user UID mapping
        `buildContainerConfig` in `src/index.ts` MUST declare
        `user: { inImageUid: 1000, inImageGid: 1000 }`. The mayara
        image declares `USER mayara` with UID/GID 1000. Without the
        explicit user field, signalk-container defaults `inImageUid`
        to 0; on rootless podman the keep-id mapping then puts the
        in-image UID 1000 at host UID `100999` (subuid range), and on
        docker / rootful podman the process runs as the SK host
        user's UID — either way `/home/mayara/.local/share` (owned
        by uid 1000 inside the image) is unwritable and mayara fails
        to start. Test guard: "declares the mayara image in-image
        UID/GID for correct uid mapping" in
        `test/container-integration.test.ts`. Flag any PR that
        removes the `user` field from `buildContainerConfig`.

        ## DEFAULT_RESOURCES ↔ README sync
        `src/index.ts` passes `DEFAULT_RESOURCES` to
        `ensureRunning`. Users can field-level-override any limit via
        signalk-container's plugin config
        (`containerOverrides["mayara-server"]`). When changing
        defaults, the README "Resource Limits" table at the bottom of
        that section must also be updated. Flag any PR that touches
        `DEFAULT_RESOURCES` without a corresponding README diff.

    - path: 'test/**/*.ts'
      instructions: |
        ## vitest only
        Tests run via `npm run test` (vitest). Flag any test file
        that introduces a different runner (jest, mocha, etc.).

        ## Mock external collaborators
        The plugin's external collaborators (mayara-client,
        signalk-container API, fetch) are mocked at the top of
        `test/container-integration.test.ts` and
        `test/signalk-token.test.ts`. Default stubs are reset in
        `beforeEach()` so call counts don't leak between tests —
        when adding new mocks, follow the same reset pattern. Flag
        tests that issue real HTTP against `127.0.0.1` / `localhost`
        paths, or that don't reset mocks between cases.

        ## Token-flow tests use vi.mocked()
        Token-flow tests in `test/signalk-token.test.ts` override
        mocks per-test via `vi.mocked()`. Container-integration tests
        mock the token module by default so they don't issue stray
        HTTP requests against a non-existent local Signal K. Preserve
        this separation.

        ## Async timers
        Tests that poll or await retries should use vitest fake
        timers rather than real `setTimeout` waits. Flag tests with
        real `setTimeout(..., 1000+)` that would slow CI.

        ## Regression sentinels — do not remove
        Three sentinel tests guard architectural invariants. Flag any
        PR that deletes or renames them:
        - `test/container-integration.test.ts` — "src/index.ts does
          not import fs" (guards centralised container-drift handling)
        - `test/container-integration.test.ts` — "starts the container
          even when start() is called with empty config" (guards the
          schema-defaults merge)
        - `test/container-integration.test.ts` — "declares the mayara
          image in-image UID/GID for correct uid mapping" (guards the
          `user` field on `buildContainerConfig`)

    - path: '.github/workflows/**'
      instructions: |
        ## No NPM_TOKEN / NODE_AUTH_TOKEN in publish.yml
        Trusted publishing via OIDC is configured on npm; no
        `NPM_TOKEN` secret exists or is needed. Flag any PR that adds
        `NODE_AUTH_TOKEN`, `NPM_TOKEN`, or `secrets.NPM_TOKEN` to
        `publish.yml`.

        ## No pull_request trigger on signalk-ci.yml
        `signalk-ci.yml` is intentionally on `push` to main and
        `workflow_dispatch` only — there is no `pull_request:`
        trigger. Reviewers dispatch it manually on a PR branch via
        `gh workflow run signalk-ci.yml --ref <branch>`. Flag any PR
        that adds a `pull_request` trigger to that workflow without
        an explicit operator-facing reason in the description.

        ## Publish fires on v* tag
        `publish.yml` fires on `v*` tag push. It creates a GitHub
        Release with auto-generated notes (one line per PR since the
        previous tag) then `npm publish`es via OIDC trusted
        publishing. Flag any PR that changes the trigger or breaks
        the release-notes generation.

    - path: 'src/config/schema.ts'
      instructions: |
        ## Keep SCHEMA_DEFAULTS in sync with the schema
        Every field that has a `default` in the JSON schema MUST also
        be present in `SCHEMA_DEFAULTS`, because Signal K does not
        inject schema defaults at runtime (see the merge in
        `start()`). Flag any PR that adds or changes a schema
        `default` without updating `SCHEMA_DEFAULTS` — the new field
        will be `undefined` at runtime when the plugin is
        auto-enabled, even though the admin-UI form shows the
        intended value.

    - path: 'public/**'
      instructions: |
        ## Config panel: source of truth
        `public/` holds the React config-panel sources. `npm run
        build` runs `webpack` to bundle them into `plugin/`. Flag PRs
        that modify `plugin/` files directly — they are build output
        and should be regenerated from `public/`. Flag PRs that
        change `public/` without rebuilding the corresponding
        tracked `plugin/` artifact.

    - path: 'package.json'
      instructions: |
        ## Node engines floor: 4-place sync
        When bumping the Node engines floor, the following MUST all
        be updated in the same PR, or the dependabot/CI/README story
        falls out of sync:
        1. `engines.node` in `package.json`
        2. `@types/node` in `package.json` devDependencies (matching
           major)
        3. `.github/dependabot.yml` comment that documents the floor
        4. README "Prerequisites" line that documents the floor
        Flag any engines bump that touches fewer than these four
        places.

        ## Peer dependency boundaries
        signalk-container ≥1.6.0 is declared in
        `peerDependenciesMeta` as optional and in `signalk.requires`.
        Flag any PR that bumps the floor here without updating both
        places, or that adds new peer dependencies without declaring
        them in `signalk.requires` (Signal K's plugin-manager honors
        that field).
